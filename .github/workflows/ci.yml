name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    name: pytest on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest tests/ -v

  notebook-parse:
    name: Validate notebook JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install nbformat
        run: pip install nbformat

      - name: Validate every committed notebook
        run: |
          set -e
          for nb in $(find . -name '*.ipynb' -not -path './.*' -not -path '*/\.ipynb_checkpoints/*'); do
            echo "Validating $nb"
            python -c "import nbformat; nbformat.validate(nbformat.read('$nb', as_version=4))"
          done

  no-banned-phrasing:
    name: Reject em-dashes, curly quotes, and meta phrasing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan tracked files
        run: |
          set -e
          # Em-dash, en-dash, curly quotes, ellipsis - banned in tracked text files.
          # Skip the LICENSE (third-party MIT text) and binary files.
          BAD=$(git grep -l -P '[\x{2013}\x{2014}\x{2018}\x{2019}\x{201C}\x{201D}\x{2026}]' -- ':!LICENSE' ':!paper/' || true)
          if [ -n "$BAD" ]; then
            echo "Banned punctuation found in:"
            echo "$BAD"
            git grep -n -P '[\x{2013}\x{2014}\x{2018}\x{2019}\x{201C}\x{201D}\x{2026}]' -- ':!LICENSE' ':!paper/' || true
            exit 1
          fi

          # Meta-language phrasing - portfolio-meta tells the user disallowed.
          META=$(git grep -l -i -E 'honest version|interview prep|for my CV|original notebook did|what I removed and why' -- ':!.github/workflows/' ':!LICENSE' || true)
          if [ -n "$META" ]; then
            echo "Banned meta-language phrasing found in:"
            echo "$META"
            git grep -n -i -E 'honest version|interview prep|for my CV|original notebook did|what I removed and why' -- ':!.github/workflows/' ':!LICENSE' || true
            exit 1
          fi
          echo "Clean."
